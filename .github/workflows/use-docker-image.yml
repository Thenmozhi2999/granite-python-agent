name: Use Published Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-in-image:
    runs-on: ubuntu-latest
    container:
      image: thenmozhisekar/granite-python-dev:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run project checks inside the published image
        run: bash ./build.sh
